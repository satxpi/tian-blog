<!-- ══ 合集索引页模板 ══ -->
<div class="container" style="padding-top:3rem;padding-bottom:4rem;">

  <div style="margin-bottom:3rem;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:1rem;">COLLECTIONS</div>
    <h1 style="font-family:'Noto Serif SC',serif;font-size:clamp(2rem,5vw,3rem);font-weight:900;">文章合集</h1>
    <p style="color:var(--text-muted);margin-top:0.75rem;">按主题整理的系列文章，适合从头读到尾。</p>
  </div>

  <!-- 广告位 -->
  <div class="ad-unit ad-unit-leaderboard" style="margin-bottom:2.5rem;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <div class="collections-grid">
    {% for col in collections %}
    <a href="{{ col.url }}" class="collection-card">
      <div class="collection-icon">{{ col.icon }}</div>
      <div class="collection-title">{{ col.name }}</div>
      <div class="collection-desc">{{ col.description }}</div>
      <div class="collection-count">{{ col.count }} 篇</div>
    </a>
    {% endfor %}
  </div>

</div>
