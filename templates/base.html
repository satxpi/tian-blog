<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- SEO -->
  <title>{{ title }} | 老田的博客</title>
  <meta name="description" content="{{ description }}">
  <meta name="author" content="老田">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ canonical_url }}">
  <!-- Open Graph -->
  <meta property="og:title" content="{{ title }} | 老田的博客">
  <meta property="og:description" content="{{ description }}">
  <meta property="og:type" content="{{ og_type | default('website') }}">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta property="og:site_name" content="老田的博客">
  <meta property="og:locale" content="zh_CN">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ title }} | 老田的博客">
  <meta name="twitter:description" content="{{ description }}">
  <!-- 搜索索引路径标记 -->
  <meta name="search-index" content="{{ root_url }}search.json">
  <!-- 样式 -->
  <link rel="stylesheet" href="{{ static_root }}css/style.css">
  <!-- Google AdSense -->
  <!-- 替换 ca-pub-XXXXXXXXXXXXXXXX 为你的真实 Publisher ID -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
     crossorigin="anonymous"></script>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ static_root }}images/favicon.svg">
</head>
<body>

  <!-- 阅读进度条由 JS 注入 -->

  <!-- ══ 顶部导航 ══ -->
  <header class="site-header">
    <a href="{{ root_url }}" class="site-logo">
      <span><span class="logo-accent">老</span>田</span>
      <span class="logo-tag">BLOG</span>
    </a>
    <nav class="main-nav" aria-label="主导航">
      <a href="{{ root_url }}index.html">首页</a>
      <a href="{{ root_url }}collections.html">合集</a>
      <a href="{{ root_url }}archive.html">归档</a>
      <a href="{{ root_url }}about.html">关于</a>
      <button class="search-trigger" id="search-trigger" aria-label="搜索文章" title="搜索文章">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </nav>
  </header>

  <!-- ══ 页面主体 ══ -->
  <main>
    {{ content }}
  </main>

  <!-- ══ 页脚 ══ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-links">
        <a href="{{ root_url }}about.html">关于我</a>
        <a href="{{ root_url }}privacy.html">隐私政策</a>
        <a href="{{ root_url }}disclaimer.html">免责声明</a>
        <a href="{{ root_url }}sitemap.xml">站点地图</a>
      </div>
      <p class="footer-copy">© {{ year }} 老田的博客 · 从小田变老田</p>
      <p class="footer-disclaimer">本站部分内容包含广告。广告由 Google AdSense 提供，不代表本站立场。</p>
    </div>
  </footer>

  <!-- ══ Cookie 同意横幅 ══ -->
  <div id="cookie-banner" role="dialog" aria-label="Cookie 使用说明">
    <p>本站使用 Cookie 以改善体验并展示个性化广告。继续使用即表示您同意我们的
       <a href="{{ root_url }}privacy.html">隐私政策</a>。</p>
    <button id="btn-accept-cookie" class="btn-accept">明白了</button>
  </div>

  <!-- 回到顶部 -->
  <button id="back-to-top" aria-label="回到顶部" title="回到顶部">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="{{ static_root }}js/main.js"></script>

  <!-- 搜索弹窗 -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-dialog" role="dialog" aria-label="搜索文章">
      <div class="search-input-wrap">
        <svg class="search-input-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" class="search-input" placeholder="搜文章、关键词、标签…" autocomplete="off" autofocus>
        <button class="search-close" id="search-close" aria-label="关闭搜索">&times;</button>
      </div>
      <div class="search-hint" id="search-hint">输入关键词开始搜索</div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>
</body>
</html>
